name: observabilidade

services:
  gateway:
    image: ${TRAEFIK_IMAGE:-traefik:v3.7.5}
    volumes:
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./docker/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    ports:
      - "${GATEWAY_PORT:-8088}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - observability

  api:
    build:
      context: .
    environment:
      APP_NAME: ${APP_NAME:-Observabilidade}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      SERVICE_NAME: ${SERVICE_NAME:-observabilidade-api}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DOCS_ENABLED: ${DOCS_ENABLED:-true}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-localhost,127.0.0.1,testserver,api,observabilidade-api}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
    ports:
      - "${API_PORT:-8000}:8000"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=2)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - observability

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v3.12.0}
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      gateway:
        condition: service_started
      api:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - observability

  loki:
    image: ${LOKI_IMAGE:-grafana/loki:3.5.0}
    command:
      - -config.file=/etc/loki/loki.yml
    volumes:
      - ./docker/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - observability

  alloy:
    image: ${ALLOY_IMAGE:-grafana/alloy:v1.9.2}
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/tmp/alloy
      - /etc/alloy/config.alloy
    volumes:
      - ./docker/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - ./logs:/var/log/observabilidade:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${ALLOY_PORT:-12345}:12345"
    depends_on:
      - loki
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - observability

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:13.0.2}
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me-in-production}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_SECURITY_COOKIE_SECURE: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
      - loki
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - observability

networks:
  observability:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
