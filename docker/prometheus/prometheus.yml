global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: observability-gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - gateway:9100

  - job_name: observabilidade-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8000
